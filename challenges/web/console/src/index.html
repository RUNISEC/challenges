<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureVault - Password Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0f1923;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .navbar {
            background-color: #1a2733;
            padding: 1rem 5%;
            border-bottom: 1px solid #2a3f52;
        }

        .navbar-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: #4fc3f7;
        }

        .nav-links a {
            margin-left: 2rem;
            text-decoration: none;
            color: #b0bec5;
        }

        .nav-links a:hover {
            color: #4fc3f7;
        }

        .main-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .login-card {
            background-color: #1a2733;
            border: 1px solid #2a3f52;
            border-radius: 12px;
            padding: 2.5rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .login-card h2 {
            text-align: center;
            margin-bottom: 0.5rem;
            color: #4fc3f7;
        }

        .login-card p {
            text-align: center;
            color: #78909c;
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.4rem;
            color: #b0bec5;
            font-size: 0.9rem;
        }

        .form-group input {
            width: 100%;
            padding: 0.75rem 1rem;
            background-color: #0f1923;
            border: 1px solid #2a3f52;
            border-radius: 6px;
            color: #e0e0e0;
            font-size: 1rem;
        }

        .form-group input:focus {
            outline: none;
            border-color: #4fc3f7;
        }

        .login-btn {
            width: 100%;
            padding: 0.85rem;
            background-color: #4fc3f7;
            color: #0f1923;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 0.5rem;
        }

        .login-btn:hover {
            background-color: #39a8d8;
        }

        .login-footer {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.85rem;
            color: #78909c;
        }

        .login-footer a {
            color: #4fc3f7;
            text-decoration: none;
        }

        footer {
            background-color: #1a2733;
            padding: 1.5rem;
            text-align: center;
            color: #546e7a;
            font-size: 0.85rem;
            border-top: 1px solid #2a3f52;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-content">
            <div class="logo">SecureVault</div>
            <div class="nav-links">
                <a href="#">Features</a>
                <a href="#">Pricing</a>
                <a href="#">Support</a>
            </div>
        </div>
    </nav>

    <div class="main-content">
        <div class="login-card">
            <h2>Welcome Back</h2>
            <p>Sign in to access your vault</p>
            <form onsubmit="return false;">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="you@example.com">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password">
                </div>
                <button class="login-btn" type="submit">Sign In</button>
            </form>
            <div class="login-footer">
                <p>Don't have an account? <a href="#">Sign up</a></p>
            </div>
        </div>
    </div>

    <footer>
        <p>2025 SecureVault Inc. All rights reserved.</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
